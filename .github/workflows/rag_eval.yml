name: RAG Evaluation Benchmark

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      embedding_model:
        description: 'Embedding Model'
        required: false
        default: 'mock'
        type: choice
        options:
          - mock
          - huggingface
          - openai
      llm_model:
        description: 'LLM Model'
        required: false
        default: 'mock'
        type: choice
        options:
          - mock
          - huggingface
          - openai

env:
  PYTHON_VERSION: '3.11'
  EMBEDDING_MODEL: ${{ github.event.inputs.embedding_model || 'mock' }}
  LLM_MODEL: ${{ github.event.inputs.llm_model || 'mock' }}

jobs:
  benchmark:
    name: Run RAG Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Create necessary directories
        run: |
          mkdir -p evaluations/reports evaluations/baselines chroma_db_eval

      - name: Check if baseline exists
        id: baseline_check
        run: |
          if [ -f "evaluations/baselines/baseline_metrics.json" ]; then
            echo "baseline_exists=true" >> $GITHUB_OUTPUT
            echo "Baseline metrics found"
          else
            echo "baseline_exists=false" >> $GITHUB_OUTPUT
            echo "No baseline found, first run will establish baseline"
          fi

      - name: Run benchmark evaluation
        run: |
          python scripts/run_benchmark.py \
            --config benchmark_config.json \
            --output evaluations/reports/latest.json \
            --embedding ${{ env.EMBEDDING_MODEL }} \
            --llm ${{ env.LLM_MODEL }}

      - name: Save baseline (first run only)
        if: steps.baseline_check.outputs.baseline_exists == 'false'
        run: |
          python scripts/run_benchmark.py \
            --config benchmark_config.json \
            --output evaluations/reports/latest.json \
            --embedding ${{ env.EMBEDDING_MODEL }} \
            --llm ${{ env.LLM_MODEL }} \
            --save-baseline

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add evaluations/baselines/baseline_metrics.json
          git commit -m "docs: establish initial benchmark baseline [skip ci]"
          git push

      - name: Compare with baseline
        if: steps.baseline_check.outputs.baseline_exists == 'true'
        run: |
          python scripts/compare_metrics.py \
            --current evaluations/reports/latest.json \
            --baseline evaluations/baselines/baseline_metrics.json \
            --config benchmark_config.json \
            --output evaluations/reports/comparison.json

      - name: Generate reports
        run: |
          python scripts/generate_report.py \
            --results evaluations/reports/latest.json \
            --output evaluations/reports/latest.md \
            --comparison evaluations/reports/comparison.json \
            --json-summary evaluations/reports/summary.json

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            evaluations/reports/
            chroma_db_eval/
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.baseline_check.outputs.baseline_exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comparison = JSON.parse(fs.readFileSync('evaluations/reports/comparison.json', 'utf8'));
            const results = JSON.parse(fs.readFileSync('evaluations/reports/latest.json', 'utf8'));

            const statusIcon = comparison.passed ? '✅' : '❌';
            const status = comparison.passed ? 'PASS' : 'FAIL';

            let body = `## RAG Benchmark Results ${statusIcon}\n\n`;
            body += `**Status:** ${status}\n`;
            body += `**Baseline:** ${comparison.baseline_created?.substring(0, 10) || 'N/A'}\n\n`;

            body += '| Metric | Baseline | Current | Change | Status |\n';
            body += '|--------|----------|---------|--------|--------|\n';

            for (const r of comparison.results) {
              const baseline = `${(r.baseline * 100).toFixed(1)}%`;
              const current = `${(r.current * 100).toFixed(1)}%`;
              const change = r.change_pct === Infinity ? 'N/A' : `${r.change_pct > 0 ? '+' : ''}${r.change_pct.toFixed(1)}%`;
              const icon = r.passed ? '✅' : '❌';
              body += `| ${r.metric.replace('_', ' ')} | ${baseline} | ${current} | ${change} | ${icon} |\n`;
            }

            body += `\n**Summary:** ${comparison.passed_metrics}/${comparison.total_metrics} metrics passed\n`;
            body += `- Improved: ${comparison.improved_metrics}\n`;
            body += `- Degraded: ${comparison.degraded_metrics}\n`;
            body += `- Failed: ${comparison.failed_metrics}\n\n`;
            body += `*Total Latency: ${(results.performance?.total_latency_ms || 0).toFixed(0)}ms*\n`;
            body += `*Est. Cost: $${(results.performance?.estimated_cost_usd || 0).toFixed(6)}*\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Set deployment status
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ "${{ steps.baseline_check.outputs.baseline_exists }}" == "true" ]; then
            python scripts/compare_metrics.py \
              --current evaluations/reports/latest.json \
              --baseline evaluations/baselines/baseline_metrics.json \
              --config benchmark_config.json
            echo "exit_code=$?" > $GITHUB_OUTPUT
          else
            echo "exit_code=0" > $GITHUB_OUTPUT
          fi

      - name: Fail workflow if benchmark degraded
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.baseline_check.outputs.baseline_exists == 'true'
        run: |
          exit $(cat $GITHUB_OUTPUT | grep exit_code | cut -d= -f2)

  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate markdown report
        run: |
          if [ -f "evaluations/reports/latest.md" ]; then
            echo "Report already generated"
          else
            echo "# Benchmark Report\n\nNo report available" > evaluations/reports/latest.md
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: evaluations/reports/latest.md
          retention-days: 7
